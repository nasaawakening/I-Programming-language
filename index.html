<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I++ Terminal IDE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div class="title">nasa@bangi: ~/ipp-compiler</div>
    </div>

    <div class="editor-wrapper">
        <textarea id="editing" spellcheck="false" oninput="updateView(); syncScroll();" onscroll="syncScroll()"></textarea>
        <pre id="highlighting" aria-hidden="true"><code class="language-javascript" id="highlighting-content"></code></pre>
    </div>

    <div class="controls">
        <button onclick="jalankanIpp()">./run_ipp</button>
        <button onclick="clearConsole()">clear</button>
    </div>

    <div class="console-section">
        <div class="console-label">// SYSTEM_LOG</div>
        <pre id="output">I++ System v1.0 - Ready in Kayenlor.</pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="script.js"></script>
</body>
</html>
