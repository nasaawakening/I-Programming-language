<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I++ Programming Language</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>

<div class="container">
    <header>
        <h1>I++ <span class="version">v1.0</span></h1>
        <p>Interpreter Engine by <strong>Nasa</strong></p>
    </header>

    <div class="editor-wrapper">
        <textarea id="editing" spellcheck="false" oninput="updateView(); syncScroll();" onscroll="syncScroll()"></textarea>
        <pre id="highlighting" aria-hidden="true"><code class="language-javascript" id="highlighting-content"></code></pre>
    </div>

    <div class="controls">
        <button onclick="jalankanIpp()" id="runBtn">RUN CODE ▶</button>
        <button onclick="clearConsole()" id="clearBtn">Hapus Konsol</button>
    </div>

    <div class="console-box">
        <h3>Terminal Output:</h3>
        <pre id="output">> Mesin I++ siap di Kayenlor...</pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="script.js"></script>
</body>
</html>
