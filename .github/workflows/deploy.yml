name: Deploy and Release I++

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # JOB 1: Deploy ke GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    # JOB 2: Create Release Tag & Upload Files
  release:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip Source Files
        run: |
          zip -r ipp-engine-v${{ github.run_number }}.zip index.html style.css script.js README.md LICENSE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: I++ Engine v1.0.${{ github.run_number }}
          # Bagian di bawah ini akan menambahkan link ke deskripsi Release
          body: |
            ## 🚀 I++ v1.0.${{ github.run_number }} is Live!
            
            Versi ini telah berhasil dideploy dan siap digunakan.
            
            **🔗 [Klik di sini untuk mencoba I++ secara langsung!](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)**
            
            ---
            ### 🛠️ Perubahan:
            - Update otomatis sistem I++ (Build #${{ github.run_number }})
            - Peningkatan performa Terminal UI
            - Fitur Export/Import aktif
          files: ipp-engine-v${{ github.run_number }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
